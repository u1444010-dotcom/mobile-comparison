<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Compare Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📱 Mobile Compare Hub</h1>
  <input type="text" id="searchBar" placeholder="Search mobile...">
</header>

<div class="container">

  <!-- PHONE 1 -->
  <div class="card" data-name="iphone 15">
    <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg" alt="iPhone 15">
    <h2>iPhone 15</h2>
    <p>48MP Camera</p>
    <p>Battery 3349 mAh</p>
    <a href="https://www.apple.com" target="_blank">Buy on Apple</a>
  </div>

  <!-- PHONE 2 -->
  <div class="card" data-name="samsung s24">
    <img src="https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s24-1.jpg" alt="Samsung S24">
    <h2>Samsung S24</h2>
    <p>50MP Camera</p>
    <p>Battery 4000 mAh</p>
    <a href="https://www.samsung.com" target="_blank">Buy on Samsung</a>
  </div>

  <!-- PHONE 3 -->
  <div class="card" data-name="xiaomi 14">
    <img src="https://fdn2.gsmarena.com/vv/pics/xiaomi/xiaomi-14-1.jpg" alt="Xiaomi 14">
    <h2>Xiaomi 14</h2>
    <p>50MP Camera</p>
    <p>Battery 4610 mAh</p>
    <a href="#">Buy on Amazon</a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
