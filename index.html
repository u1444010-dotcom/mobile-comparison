<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Compare Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📱 Mobile Compare Hub</h1>

  <input type="text" id="searchBar" placeholder="Search mobile...">

  <div class="options">
    <select id="language">
      <option>Language</option>
      <option>English</option>
      <option>Urdu</option>
    </select>

    <select id="country">
      <option>Country</option>
      <option>Pakistan</option>
      <option>India</option>
      <option>USA</option>
    </select>
  </div>
</header>

<div class="container">

  <div class="card" data-name="iphone 15">
    <h2>iPhone 15</h2>
    <p>48MP Camera</p>
    <p>Battery 3349 mAh</p>
    <a href="https://www.apple.com" target="_blank">Buy</a>
  </div>

  <div class="card" data-name="samsung s24">
    <h2>Samsung S24</h2>
    <p>50MP Camera</p>
    <p>Battery 4000 mAh</p>
    <a href="https://www.samsung.com" target="_blank">Buy</a>
  </div>

  <div class="card" data-name="xiaomi 14">
    <h2>Xiaomi 14</h2>
    <p>50MP Camera</p>
    <p>Battery 4610 mAh</p>
    <a href="#">Buy</a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
