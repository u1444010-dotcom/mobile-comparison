<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Compare Store</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  text-align: center;
}

header {
  background: #111827;
  padding: 20px;
}

input {
  padding: 10px;
  width: 60%;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  width: 220px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card a {
  display: inline-block;
  margin-top: 10px;
  background: #22c55e;
  padding: 8px;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

.badge {
  background: red;
  padding: 4px 6px;
  font-size: 10px;
  border-radius: 5px;
  position: absolute;
}

h2 {
  margin-top: 30px;
}
</style>
</head>

<body>

<header>
  <h1>📱 Mobile Compare Store</h1>
  <p>🔥 Amazon Affiliate Deals</p>

  <input type="text" id="search" placeholder="Search mobile...">
</header>

<!-- APPLE -->
<h2>🍎 Apple</h2>
<div class="container">

  <div class="card" data-name="iphone 15">
    <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg">
    <h3>iPhone 15</h3>
    <p>$999</p>
    <a href="https://www.amazon.com/Apple-iPhone-15-128GB-Black/dp/B0CMPMY9ZZ?tag=mobilecompa09-20" target="_blank">Buy on Amazon</a>
  </div>

</div>

<!-- SAMSUNG -->
<h2>📱 Samsung</h2>
<div class="container">

  <div class="card" data-name="samsung s24">
    <img src="https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s24-1.jpg">
    <h3>Samsung S24</h3>
    <p>$899</p>
    <a href="https://www.amazon.com/SAMSUNG-Galaxy-S24-Ultra-Titanium/dp/B0D362HGNP?tag=mobilecompa09-20" target="_blank">Buy on Amazon</a>
  </div>

</div>

<script>
// SEARCH FILTER
document.getElementById("search").addEventListener("keyup", function () {
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.getAttribute("data-name");
    card.style.display = name.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
