<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Compare Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📱 Mobile Compare Hub</h1>
  <p>🔥 Best Amazon Mobile Deals</p>

  <input type="text" id="search" placeholder="Search mobile...">
  <button onclick="sortLow()">Sort Low → High</button>
</header>

<h2>🔥 Top Deals</h2>

<div class="grid" id="mobileList">

  <div class="card" data-name="iphone 15" data-price="999">
    <span class="badge">🔥 Best Deal</span>
    <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg">
    <h3>iPhone 15</h3>
    <p>$999</p>
    <a href="https://www.amazon.com/Apple-iPhone-15-128GB-Black/dp/B0CMPMY9ZZ?tag=mobilecompa09-20" target="_blank">💰 Buy on Amazon</a>
  </div>

  <div class="card" data-name="samsung s24" data-price="899">
    <span class="badge">🔥 Best Deal</span>
    <img src="https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s24-1.jpg">
    <h3>Samsung S24</h3>
    <p>$899</p>
    <a href="https://www.amazon.com/SAMSUNG-Galaxy-S24-Ultra-Titanium/dp/B0D362HGNP?tag=mobilecompa09-20" target="_blank">💰 Buy on Amazon</a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
