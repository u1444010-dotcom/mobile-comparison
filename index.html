<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Compare Hub</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

header {
  background: #111827;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

.grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
  position: relative;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card a {
  display: inline-block;
  margin-top: 10px;
  background: #22c55e;
  padding: 8px;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

.badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: red;
  padding: 4px 6px;
  font-size: 10px;
  border-radius: 5px;
}

table {
  width: 90%;
  margin: 30px auto;
  border-collapse: collapse;
  background: #1f2937;
}

th, td {
  padding: 12px;
  border: 1px solid #374151;
}

img {
  width: 120px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
  <h1>📱 Mobile Compare Hub</h1>
  <p>🔥 Amazon Affiliate Deals</p>

  <input type="text" id="search" placeholder="Search mobile...">
</header>

<!-- TOP SECTION -->
<h2>🔥 Top Mobiles</h2>

<div class="grid" id="mobileList">

  <div class="card" data-name="iphone 15" data-price="999">
    <span class="badge">🔥 Best</span>
    <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg">
    <h3>iPhone 15</h3>
    <p>$999</p>
    <a href="https://www.amazon.com/Apple-iPhone-15-128GB-Black/dp/B0CMPMY9ZZ?tag=mobilecompa09-20" target="_blank">💰 Buy</a>
  </div>

  <div class="card" data-name="samsung s24" data-price="899">
    <span class="badge">🔥 Best</span>
    <img src="https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s24-1.jpg">
    <h3>Samsung S24</h3>
    <p>$899</p>
    <a href="https://www.amazon.com/SAMSUNG-Galaxy-S24-Ultra-Titanium/dp/B0D362HGNP?tag=mobilecompa09-20" target="_blank">💰 Buy</a>
  </div>

</div>

<!-- TABLE -->
<h2>📊 Comparison Table</h2>

<table>

<tr>
  <th>Feature</th>
  <th>Samsung S24</th>
  <th>iPhone 15</th>
</tr>

<tr>
  <td>Camera</td>
  <td>50MP</td>
  <td>48MP</td>
</tr>

<tr>
  <td>Battery</td>
  <td>4000 mAh</td>
  <td>3349 mAh</td>
</tr>

<tr>
  <td>Gaming</td>
  <td>🔥 High FPS</td>
  <td>🔥 Smooth iOS</td>
</tr>

<tr>
  <td>Buy</td>
  <td>
    <a href="https://www.amazon.com/SAMSUNG-Galaxy-S24-Ultra-Titanium/dp/B0D362HGNP?tag=mobilecompa09-20" target="_blank">Buy Samsung</a>
  </td>
  <td>
    <a href="https://www.amazon.com/Apple-iPhone-15-128GB-Black/dp/B0CMPMY9ZZ?tag=mobilecompa09-20" target="_blank">Buy iPhone</a>
  </td>
</tr>

</table>

<script>
// SEARCH
document.getElementById("search").addEventListener("keyup", function () {
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.getAttribute("data-name");
    card.style.display = name.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
